# Docs: https://firebase.google.com/docs/app-hosting/apphosting-yaml
backendId: callqualityapp
location: us-central1
# Specifies the commands that App Hosting runs to build and serve your app.
runConfig:
  # The command to build your app.
  # This command is run before `npm start` and `npm run serve`.
  # Optional.
  build: npm run build

  # The command to run your app in production.
  # Required.
  start: npm run start
env:
  - variable: NEXT_PUBLIC_FIREBASE_WEBAPP_CONFIG
    value: ${FIREBASE_APP_CONFIG}
concurrency: 80
minInstances: 0
